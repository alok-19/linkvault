services:
  linkvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkvault
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persist SQLite database and thumbnails
      - linkvault-data:/app/data
      - linkvault-thumbs:/app/public/thumbs
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  linkvault-data:
  linkvault-thumbs:
