<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- Premium gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Subtle inner glow -->
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Inner highlight -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#glow)" style="mix-blend-mode: overlay;"/>

  <!-- Bookmark / Vault symbol -->
  <g transform="translate(64, 64)" filter="url(#shadow)">
    <!-- Main bookmark body -->
    <path d="M-28 -36 
             L28 -36 
             C32 -36 32 -32 32 -28
             L32 24
             C32 28 28 30 24 28
             L2 12
             C0 10 -2 10 -4 12
             L-26 28
             C-30 30 -34 28 -34 24
             L-34 -28
             C-34 -32 -32 -36 -28 -36Z" 
          fill="white"/>

    <!-- Link ring / vault dot -->
    <circle cx="0" cy="-8" r="10" fill="#4f46e5"/>
    <circle cx="0" cy="-8" r="5" fill="white"/>

    <!-- Folded corner detail -->
    <path d="M28 -36 L32 -32 L32 -28 C32 -32 32 -36 28 -36Z" fill="#e0e7ff" opacity="0.6"/>
  </g>
</svg>
